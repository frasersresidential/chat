<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>OmniChat — Omni-Channel Inbox</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0e1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OmniChat" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />

  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">📨 <span>OmniChat</span></div>
      <nav class="nav" id="nav">
        <button data-view="inbox" class="active">Inbox</button>
        <button data-view="channels">Channels</button>
        <button data-view="teams">Teams</button>
        <button data-view="users">Users</button>
        <button data-view="routing">Routing</button>
        <button data-view="automation">Automation</button>
        <button data-view="broadcast">Broadcast</button>
        <button data-view="reports">Reports</button>
        <button data-view="simulator">Simulator</button>
      </nav>
      <div class="topbar-right">
        <button id="installBtn" class="icon-btn hidden" title="ติดตั้งแอป">⬇️ ติดตั้ง</button>
        <button id="soundBtn" class="icon-btn" title="เปิด/ปิดเสียงแจ้งเตือน">🔕</button>
        <button id="notifBtn" class="icon-btn" title="Notifications">🔔<span id="notifCount" class="badge hidden">0</span></button>
        <select id="presenceSel" title="My availability">
          <option value="online">🟢 Online</option>
          <option value="busy">🟠 Busy</option>
          <option value="away">🟡 Away</option>
          <option value="offline">⚪ Offline</option>
        </select>
        <select id="userSel" title="Act as user (demo auth)"></select>
      </div>
    </header>

    <!-- Notifications dropdown -->
    <div id="notifPanel" class="notif-panel hidden"></div>

    <main id="main"></main>
  </div>
  <script src="/app.js" type="module"></script>
  <script>
    // Register the service worker so the app is installable / works offline.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch((e) => console.warn('SW register failed', e));
      });
    }
    // Android / desktop Chrome install prompt.
    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });
    window.addEventListener('appinstalled', () => installBtn.classList.add('hidden'));
  </script>
</body>
</html>
