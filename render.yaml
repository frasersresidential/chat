# One-click deploy to Render (https://render.com).
# In Render: New → Blueprint → connect this repo → it reads this file.
services:
  - type: web
    name: omnichat
    runtime: node
    plan: free
    branch: claude/relaxed-gauss-s9wp05
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: AUTH_SECRET
        generateValue: true        # Render generates a strong random secret
      - key: DEMO_PASSWORD
        sync: false                # set your own in the dashboard
    # NOTE: the free plan has an EPHEMERAL filesystem — the JSON store + uploads
    # reset on every redeploy/restart (data re-seeds fresh). To persist data,
    # upgrade the instance and add a disk mounted at /app/data:
    #   disk:
    #     name: omnichat-data
    #     mountPath: /app/data
    #     sizeGB: 1
